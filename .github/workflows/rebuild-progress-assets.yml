name: Rebuild progress assets

on:
  push:
    branches: [main]
    paths:
      - 'data/wdr_par_en/wdr/msg/**/*.po'
      - '.github/workflows/rebuild-progress-assets.yml'
      - 'tools/progress/build_progress_assets.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-progress-assets
  cancel-in-progress: true

jobs:
  rebuild-progress-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild progress assets
        run: python tools/progress/build_progress_assets.py

      - name: Commit updated assets
        shell: bash
        run: |
          if git diff --quiet -- assets/progress; then
            echo "No progress asset changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/progress
          git commit -m "Update progress assets"
          git push
